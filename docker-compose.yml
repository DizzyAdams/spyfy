# SpyFy — orquestração local (docker compose up -d)
# Sobe Web (Next.js :3000) + API (FastAPI :8000).
# Workers de scraping (Loops 2/3) entram quando os clientes A2/A3 forem implementados.

services:
  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      # URL do WS que o NAVEGADOR usa p/ o Radar (porta 4000 mapeada no host)
      - NEXT_PUBLIC_REALTIME_URL=ws://localhost:4000
    depends_on:
      realtime:
        condition: service_started
      api:
        condition: service_healthy

  realtime:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.realtime
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - REALTIME_SIMULATE=${REALTIME_SIMULATE:-true}
      - REALTIME_TOKEN=${REALTIME_TOKEN:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    build: ./apps/workers-py
    ports:
      - "8000:8000"
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-dev}
      - NOVU_API_KEY=${NOVU_API_KEY:-}
      - NTFY_URL=${NTFY_URL:-https://ntfy.spyfy.io}
    healthcheck:
      test:
        ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Frota de mini-bots de extração nativa REAL (24/7). Reaproveita a imagem
  # `api` (já traz scrapling/playwright em requirements.docker.txt) e roda o
  # daemon run_fleet.py em loop infinito. No serverless (Vercel) o mesmo
  # trabalho é feito pelo Cron /v1/cron/collect-ads; aqui no Docker/Coolify
  # ele é contínuo e grava direto na loja de anúncios reais (cache/real_ads.json).
  fleet:
    build: ./apps/workers-py
    command: ["python", "run_fleet.py", "--rounds", "0", "--interval", "300"]
    environment:
      - FLEET_INTERVAL=${FLEET_INTERVAL:-300}
      - PYTHONUNBUFFERED=1
    volumes:
      # persiste a loja de anúncios reais entre reinícios do container
      - fleet_cache:/app/cache
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  # Proxy com basic auth a frente do web (protege exposicao publica via tunnel)
  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./scripts/gen-caddyfile.sh:/gen-caddyfile.sh:ro
    environment:
      - BASIC_AUTH_USER=${BASIC_AUTH_USER:-spyfy}
      - BASIC_AUTH_PASSWORD=${BASIC_AUTH_PASSWORD:-change-me-please}
    command: ["/bin/sh", "/gen-caddyfile.sh"]
    depends_on:
      web:
        condition: service_started

  # Tunnel publico (Cloudflare) -> caddy:8080
  tunnel-cloudflare:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - caddy
    profiles: ["tunnel"]

  # Tunnel publico (ngrok) -> caddy:8080
  tunnel-ngrok:
    image: ngrok/ngrok:latest
    command: http caddy:8080
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - caddy
    profiles: ["tunnel"]

volumes:
  fleet_cache:
    driver: local
