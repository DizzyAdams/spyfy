# CI do backend SpyFy (FastAPI / workers-py)
# Roda em cada push/PR: lint (ruff), type-check (mypy), testes (pytest) e uma
# validação live dos endpoints via import da app. O deploy real em free tier é
# feito pelo Render (render.yaml) ou HuggingFace Spaces conforme docs/08-devops.
name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - "apps/workers-py/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    paths:
      - "apps/workers-py/**"
      - ".github/workflows/ci-backend.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/workers-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff mypy
      - name: Ruff (lint)
        run: ruff check spyfy || true
      - name: Mypy (type-check)
        run: mypy spyfy || true
      - name: Pytest
        run: pytest -q
      - name: Smoke — app importa e endpoints registrados
        run: |
          python -c "from spyfy.api.app import create_app; app=create_app(); routes=[r.path for r in app.routes]; assert '/health' in routes and '/v1/agents/run' in routes, routes; print('OK endpoints:', len(routes))"
