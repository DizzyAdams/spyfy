# SpyFy API — deploy via Coolify (https://coolify.io), free tier self-hosted.
# No Coolify: "New Resource" -> "Docker Compose" -> aponte este arquivo
# (ou cole o conteúdo). Coolify injeta a porta via $PORT; o Dockerfile já a honra.
# Free tier: 1 worker gunicorn (WEB_CONCURRENCY=1, ~512MB RAM), chromadb/langgraph
# rodam 100% offline (embeddings determinísticos, sem GPU/LLM).
services:
  spyfy-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: spyfy-api:latest
    restart: unless-stopped
    environment:
      - PORT=8000
      - WEB_CONCURRENCY=1
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-dev}
      - NTFY_URL=${NTFY_URL:-https://ntfy.sh/spyfy}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://spyfyprod.vercel.app,http://localhost:3000,http://localhost:8080}
    ports:
      - "${PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import os,urllib.request as u; u.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
